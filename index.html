<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/favicon/lista.png">
    <title>Minhas Tarefas!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/estilo.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-conteudo">
            <div class="logo">
                <img src="assets/img/icone.png" alt="Logo" id="logo-img">
                <span>Minhas Tarefas!</span>
            </div>
            
            <div class="container-filtros">
                <img src="assets/img/filtro.png" alt="Ícone de Filtro" class="filtro-img">
                
                <select id="prioridade-filtro">
                    <option value="Todas">Todas Prioridades</option>
                    <option value="Alta">Alta</option>
                    <option value="Média">Média</option>
                    <option value="Baixa">Baixa</option>
                </select>

                <select id="status-filtro">
                    <option value="Todos">Todos Status</option>
                    <option value="Pendente">Pendentes</option>
                    <option value="Concluída">Concluídas</option>
                </select>
            </div>
        </div>
    </nav>

<main class="conteudo-principal">
    <section class="cartao-formulario">
        <form id="formulario-tarefa">
            <div class="linha-formulario">
                <div class="grupo-entrada">
                    <input type="text" id="titulo-tarefa" placeholder="Título da tarefa..." required>
                    <div class="sub-linha">
                        <select id="prioridade-tarefa">
                            <option value="Baixa">Baixa Prioridade</option>
                            <option value="Média">Média Prioridade</option>
                            <option value="Alta">Alta Prioridade</option>
                        </select>
                        <button type="submit" id="btn-adicionar">Adicionar</button>
                    </div>
                </div>
                <textarea id="descricao-tarefa" placeholder="Descreva os detalhes da tarefa..." required></textarea>
            </div>
        </form>
    </section>

    <hr class="divisor">

    <div id="lista-tarefas">
        </div>
</main>

    <script src="assets/js/script.js"></script>

    <footer class="rodape">
        <div class="rodape-conteudo">
            <p>&copy; 2026 - Ricardo Zan | <strong>RU: 5164357</strong></p>
            <p>Trabalho de Programação Web - Análise e Desenvolvimento de Sistemas - Uninter</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
